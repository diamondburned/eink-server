esphome:
  name: "diamonds-desk-eink"
  friendly_name: "Diamond's Desk E-ink Dashboard"
  on_boot:
    priority: 600
    then:
      # Update battery level on startup:
      - output.turn_on: bsp_battery_enable
      - delay: 200ms
      - component.update: battery_voltage
      - component.update: battery_level
      # Set the error screen.
      - component.update: epaper_display

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
  flash_size: 16MB

substitutions:
  dashboard_url: "http://mizuki.lan:5100/dashboards/diamonds-desk/screenshot.png"
  refresh_interval: "5min"
  redraw_every_refreshes: 5

globals:
  - id: failing
    type: bool
    restore_value: no
    initial_value: "true"

# Useful references:
# https://github.com/esphome/feature-requests/issues/3035
# https://wiki.seeedstudio.com/reterminal_e10xx_with_esphome_advanced/#buzzer-control
# https://wiki.seeedstudio.com/reterminal_e10xx_with_esphome_advanced/#esphome-configuration
# https://wiki.seeedstudio.com/reterminal_e10xx_with_esphome_advanced/#demo-4-comprehensive-example
# https://community.home-assistant.io/t/esphome-epaper-stopped-working-after-esphome-update/912200/18

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    - delay: 1s
    - component.update: online_dashboard_image

api:

logger:

web_server:
  log: true

http_request:
  verify_ssl: false
  timeout: 45s
  watchdog_timeout: 60s

online_image:
  - id: online_dashboard_image
    url: ${dashboard_url}
    # type: GRAYSCALE
    type: BINARY
    format: PNG
    buffer_size: 16384 # 16KiB
    update_interval: ${refresh_interval}
    on_download_finished:
      then:
        - globals.set:
            id: failing
            value: "false"
        - component.update: epaper_display
    on_error:
      then:
        - globals.set:
            id: failing
            value: "true"
        - component.update: epaper_display

image:
  - id: error_image
    file: "./error-page.png"
    type: BINARY

spi:
  clk_pin: GPIO7
  mosi_pin: GPIO9

i2c:
  scl: GPIO20
  sda: GPIO19

script:
  - id: buzz_shortly
    mode: queued
    then:
      - light.turn_on:
          id: buzzer
          brightness: 50%
      - delay: 80ms
      - light.turn_off:
          id: buzzer

  - id: led_on
    mode: queued
    then:
      - light.turn_on: onboard_led

  - id: led_off
    mode: queued
    then:
      - light.turn_off: onboard_led

  - id: refresh_dashboard
    mode: single
    then:
      - script.execute: led_on
      - component.update: online_dashboard_image
      - delay: 200ms
      - script.execute: led_off
      - script.execute: buzz_shortly

display:
  - platform: waveshare_epaper
    id: epaper_display
    model: 7.50inv2p
    cs_pin: GPIO10
    dc_pin: GPIO11
    reset_pin:
      number: GPIO12
      inverted: false
    busy_pin:
      number: GPIO13
      inverted: true
    full_update_every: ${redraw_every_refreshes}
    lambda: |-
      it.image(
        0, 0,
        id(online_dashboard_image),
        COLOR_OFF, COLOR_ON
      );
    update_interval: never # unless triggered via on_download_finished

button:
  - name: Restart with Factory Default Settings
    platform: factory_reset

  - name: Buzz Shortly
    platform: template
    on_press:
      then:
        - script.execute: buzz_shortly

binary_sensor:
  - id: refresh_button
    name: "Refresh Button"
    platform: gpio
    pin: &refresh_button
      number: GPIO3 # Green button
      mode: INPUT_PULLUP
      inverted: true
      allow_other_uses: true
    on_press:
      then:
        - script.execute: refresh_dashboard

  - id: left_button
    name: "Left Button"
    platform: gpio
    pin:
      number: GPIO5
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      then:
        - script.execute: buzz_shortly
        - script.execute: led_on
        - delay: 200ms
        - script.execute: led_off

  - id: right_button
    name: "Right Button"
    platform: gpio
    pin:
      number: GPIO4
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      then:
        - script.execute: buzz_shortly
        - script.execute: led_on
        - delay: 200ms
        - script.execute: led_off

light:
  - id: buzzer
    name: Buzzer
    internal: true
    platform: monochromatic
    output: buzzer_pwm
    default_transition_length: 5ms

  - id: onboard_led
    name: "Onboard LED"
    internal: true
    platform: binary
    output: led_output

output:
  - platform: gpio
    pin: GPIO6
    id: led_output
    inverted: true

  # This component creates a raw PWM (Pulse Width Modulation) output signal. For
  # ESP32, the correct platform is 'ledc', which uses the dedicated LED Control
  # hardware peripheral.
  # https://wiki.seeedstudio.com/reterminal_e10xx_with_esphome_advanced/#buzzer-control
  - platform: ledc
    pin: GPIO45
    id: buzzer_pwm
    frequency: 1000Hz # pitch

  # https://wiki.seeedstudio.com/reterminal_e10xx_with_esphome_advanced/#battery-monitoring
  - platform: gpio
    pin: GPIO21
    id: bsp_battery_enable

sensor:
  - platform: adc
    pin: GPIO1
    name: "Battery Voltage"
    id: battery_voltage
    update_interval: 5min
    attenuation: 12db
    filters:
      - multiply: 2.0 # Voltage divider compensation

  - platform: template
    name: "Battery Level"
    id: battery_level
    unit_of_measurement: "%"
    icon: "mdi:battery"
    device_class: battery
    state_class: measurement
    lambda: "return id(battery_voltage).state;"
    update_interval: 2min
    filters:
      - calibrate_linear:
          - 4.15 -> 100.0
          - 3.96 -> 90.0
          - 3.91 -> 80.0
          - 3.85 -> 70.0
          - 3.80 -> 60.0
          - 3.75 -> 50.0
          - 3.68 -> 40.0
          - 3.58 -> 30.0
          - 3.49 -> 20.0
          - 3.41 -> 10.0
          - 3.30 -> 5.0
          - 3.27 -> 0.0
      - clamp:
          min_value: 0
          max_value: 100

deep_sleep:
  id: deep_sleep_1
  run_duration: 30s
  sleep_duration: ${refresh_interval}
  wakeup_pin:
    - pin: *refresh_button
